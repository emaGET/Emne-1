        function createRangeField(id, labelText) {
            return /*HTML*/`

        function createInputField(type, id, name, labelText) {
            let inputName=name ? `name="${name}"` : "";
            return /*HTML*/`
                <input type="${type}" id="${id}" ${inputName}>
                <label for="${id}">${labelText}</label><br/>
            `;
        }

        function createLabeledInput(type, id, labelText) {
            return /*HTML*/`
                <label for="${id}">${labelText}</label><br/>
                <input type="${type}" id="${id}"><br/>
            `;
        }
