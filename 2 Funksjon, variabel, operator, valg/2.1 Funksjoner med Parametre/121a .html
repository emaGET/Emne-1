<body>

    <button onclick="addCircleFromInput()">Legg til sirkel fra input</button>
    <button onclick="addRectFromInput()">Legg til rektangel fra input</button>
    <input type="number" id="xVerdi" placeholder="Skriv inn x-verdi" />
    <input type="number" id="yVerdi" placeholder="Skriv inn y-verdi" />
    <!-- <input type="text" id="fillFarge" placeholder="background Farge (red, green)" /> -->

    <select id="fillFarge">
        <option value="red">rød</option>
        <option value="green">grønn</option>
        <option value="blue">blå</option>
        <option value="yellow">gul</option>
    </select>

    <select id="strokeFarge">
        <option value="red">rød</option>
        <option value="green">grønn</option>
        <option value="blue">blå</option>
        <option value="yellow">gul</option>
    </select>

    <br>
    <br>

    <svg 
        id="mySvg"
        width="800" 
        height="600" 
        style="background-color: lightgray;">
    </svg>

    <script>

        function addCircle(x, y, fillFarge, strokeFarge) {
            document.getElementById("mySvg").innerHTML += /*HTML*/`
                <circle cx="${x}" cy="${y}" r="40" stroke="${strokeFarge}" stroke-width="4" fill="${fillFarge}" />            
            `;
        }

        function addRect(x, y, fillFarge, strokeFarge) {
            document.getElementById("mySvg").innerHTML += /*HTML*/`
                <rect x="${x}" y="${y}" width="80" height="60" stroke="${strokeFarge}" stroke-width="4" fill="${fillFarge}" />            
            `;
        }

        // function addCircle(y) {

        // }

        function addCircleFromInput() {
            const x = document.getElementById("xVerdi").value;
            const y = document.getElementById("yVerdi").value;
            const fillFarge = document.getElementById("fillFarge").value;
            const strokeFarge = document.getElementById("strokeFarge").value;
            addCircle(x,y,fillFarge,strokeFarge);
        }
