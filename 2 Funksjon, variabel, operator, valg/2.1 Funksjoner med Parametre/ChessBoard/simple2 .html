<!DOCTYPE html>

<html lang="en">

<head>

    <link rel="stylesheet" href="simpleStyles.css">

</head>

<body>

    <div id = "board">

    </div>

    <script>

        drawBoard();

        function drawBoard() {
            drawDoubleRow();
            drawDoubleRow();
            drawDoubleRow();
            drawDoubleRow();
        }

        function drawDoubleRow() {
            drawRowStartingWithLight();
            drawRowStartingWithDark();
        }

        function drawRowStartingWithLight() {
            drawCells();
            drawRowCore();
        }

        function drawRowStartingWithDark() {
            drawRowCore();
            drawCells();
        }

        function drawRowCore() {
            document.getElementById("board").innerHTML += /*HTML*/ ` <!-- qui rivediamo il += perché linea2 deve essere aggiunta alla linea1, e non deve sovrascrivere linea1 -->
                <div class = "lightSquare"></div>
                <div class = "darkSquare"></div>
                <div class = "lightSquare"></div>
                <div class = "darkSquare"></div>
                <div class = "lightSquare"></div>
                <div class = "darkSquare"></div>
                <div class = "lightSquare"></div>
                `;
        }

        function drawCells(){
            document.getElementById("board").innerHTML += /*HTML*/ ` <!-- qui rivediamo il += perché linea2 deve essere aggiunta alla linea1, e non deve sovrascrivere linea1 -->
                <div class = "darkSquare"></div>
                `;
        }

    </script>

</body>
</html>
