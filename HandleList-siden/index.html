<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#292525" media="(prefers-color-scheme: dark)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background-color: #292525;
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .images {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .images img {
            width: 100%;
            object-fit: contain;
            background-color: #e5e5e525;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        }

    </style>

<title>Shopping List</title>

</head>

<body onload="updateView()">
    <main>
        <h1>|||||||| shopping</h1>

        <div class="images">
            <img src="ema.webp" alt="Ema">
            <img src="ove.webp" alt="Ove">
            <img src="jamal.webp" alt="Jamal">
            <img src="sverre.webp" alt="Sverre">
        </div>
        <h1>Våres produkter på tilbud</h1>

        <div id="app"></div>
    </main>    

    
    <script src="js/model.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/view.js"></script>
</body>
</html>
