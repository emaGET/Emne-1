<!DOCTYPE html>
<html lang="en">

<head>
    <title>116 D timed</title>

    <style>
        .trafficLight {
            width: 3rem;
            height: 10rem;
            display: flex;
            flex-direction: column;
            background-color: black;
            padding: 1rem;
            gap: 1rem;
        }

        .light {
            background-color: gray;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
        }
    </style>

</head>

<body>

    <div class="trafficLight" onclick="nextPhase()">
        <div class="light" id="redLight"></div>
        <div class="light" id="yellowLight"></div>
        <div class="light" id="greenLight"></div>
    </div>

<script>

    let phase = 0;

    function nextPhase() {

        let phaseNr = 0;

        if (phase == 0) {
            phaseNr = 2000;
            document.getElementById("redLight").style.backgroundColor = "red";
            document.getElementById("yellowLight").style.backgroundColor = "gray";
            document.getElementById("greenLight").style.backgroundColor = "gray";
        }

        if (phase == 1) {
            phaseNr = 1000;
            document.getElementById("redLight").style.backgroundColor = "red";
            document.getElementById("yellowLight").style.backgroundColor = "yellow";
            document.getElementById("greenLight").style.backgroundColor = "gray";
        }

        if (phase == 2) {
            phaseNr = 2000;
            document.getElementById("redLight").style.backgroundColor = "gray";
            document.getElementById("yellowLight").style.backgroundColor = "gray";
            document.getElementById("greenLight").style.backgroundColor = "green";
        }

        if (phase == 3) {
            phaseNr = 1000;
            document.getElementById("redLight").style.backgroundColor = "gray";
            document.getElementById("yellowLight").style.backgroundColor = "yellow";
            document.getElementById("greenLight").style.backgroundColor = "gray";
        }

        phase++;

        if (phase > 3) phase = 0;

        setTimeout(nextPhase, phaseNr);

    }

    nextPhase();

</script>

</body>
</html>
