<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"> </div>
</body>
<script>
    //modell

    let teller = 0;

    //view
    function updateView() {
        document.getElementById('app').innerHTML = `
            <h1>${teller}</h1> 
            <button onclick="addTo()">add</button> 
            <button onclick="remove()">remove</button>
            `
    }

    updateView();

    function addTo(){
        teller++;
        updateView()
    }

    function remove() {
        teller--;
        updateView();
    }
    //controller

</script>
</body>

</html>
